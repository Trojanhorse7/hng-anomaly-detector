# proxy -> nextcloud, json access log lands on the docker volume
# real ip: private nets are "trusted" so X-Forwarded-For can replace $remote_addr

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # after this, $remote_addr should be the actual client if XFF was set right
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.1;
    # todo: if i put cloudflare / a load balancer in front, add their ranges here too
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    log_format hng_json escape=json
        '{'
        '"source_ip":"$remote_addr",'
        '"timestamp":"$time_iso8601",'
        '"method":"$request_method",'
        '"path":"$uri",'
        '"status":$status,'
        '"response_size":$body_bytes_sent'
        '}';

    access_log /var/log/nginx/hng-access.log hng_json;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    upstream nextcloud_app {
        # same name as the compose service, :80 is what the image listens on
        server nextcloud:80;
    }

    server {
        listen 80;
        server_name _;

        # uploads get big; bump if nextcloud complains
        client_max_body_size 10G;

        location / {
            proxy_pass http://nextcloud_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
}
