# nextcloud (given image) + nginx + detector; named log volume
# vps: docker compose up -d

name: hng-anomaly-stack

networks:
  hng_net:
    driver: bridge

volumes:
  HNG-nginx-logs:

services:
  nextcloud:
    image: kefaslungu/hng-nextcloud:latest
    container_name: hng-nextcloud
    restart: unless-stopped
    networks:
      - hng_net
    # not publishing 8080/whatever—only hitting nextcloud through nginx

  nginx:
    image: nginx:1.27-alpine
    container_name: hng-nginx
    depends_on:
      - nextcloud
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    networks:
      - hng_net

  detector:
    build: ./detector
    container_name: hng-detector
    depends_on:
      - nginx
    restart: unless-stopped
    # iptables DROP must target the host network stack — use Linux host networking on the VPS.
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      HNG_CONFIG: /app/config.yaml
      # Pass through from host `.env` (Compose substitutes ${...} when you `docker compose up`)
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - ./detector/config.yaml:/app/config.yaml:ro
      - ./data:/app/data
