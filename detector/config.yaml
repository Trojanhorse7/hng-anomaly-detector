# paths are inside the detector container when you use docker compose
log_path: /var/log/nginx/hng-access.log

# true = only new lines after start (normal on the vps)
# false = read whole file from the top (handy if you want to replay an existing log once)
start_at_end: true

# sliding windows: last N seconds of request timestamps (global + per source_ip)
window_seconds: 60
# how often to sweep stale per-ip deques (seconds)
sweep_interval_seconds: 1.0

# baseline on global per-second counts, recompute interval, hourly preference
baseline_window_seconds: 1800
baseline_recompute_interval_seconds: 60
baseline_min_std: 0.000001
baseline_floor_rps: 0.0
baseline_min_samples_current_hour: 60
# inside container: bind host ./data to /app/data in docker-compose
audit_log_path: /app/data/audit.log

# SQLite not required — JSON persists ban tier + schedules across restarts
ban_state_path: /app/data/ban_state.json
# wake interval for scheduled unbans (Slack each unban)
unbanner_tick_seconds: 3.0

slack:
  # Value comes from the environment at runtime (set SLACK_WEBHOOK_URL in `.env` or the shell).
  # Direct env SLACK_WEBHOOK_URL still wins in notifier.load_notifier_config if both are set.
  webhook_url: "${SLACK_WEBHOOK_URL}"

actions:
  enabled: true
  # avoid spamming Slack if global anomaly persists for minutes
  global_notify_cooldown_seconds: 120

dashboard:
  enabled: true
  bind_host: "0.0.0.0"
  port: 8080
  # WebSocket push interval (seconds); capped at 3 for the task SLA
  push_interval_seconds: 2.5

detection:
  z_threshold: 3.0
  z_threshold_tight: 2.0
  rate_multiplier: 5.0
  rate_multiplier_tight: 3.0
  error_surge_multiplier: 3.0
  min_baseline_error_for_surge: 0.0001
